<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0' />
        <title>Hospital Appointment System</title>
        
        <!-- PWA Meta Tags -->
        <meta name="theme-color" content="#1e40af" />
        <meta name="description" content="Book and manage your hospital appointments easily" />
        
        <!-- Android/Chrome PWA Tags -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="application-name" content="Hospital App" />
        
        <!-- iOS PWA Tags -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="Hospital Appointment" />
        
        <!-- Web App Manifest -->
        <link rel="manifest" href="manifest.webmanifest" crossorigin="use-credentials" />
        
        <!-- Icons -->
        <link rel="icon" type="image/png" sizes="32x32" href="assets/generated/favicon.dim_32x32.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="assets/generated/apple-touch-icon.dim_180x180.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="assets/generated/pwa-icon.dim_192x192.png" />
        <link rel="icon" type="image/png" sizes="512x512" href="assets/generated/pwa-icon.dim_512x512.png" />
        
        <style>
            /* Static splash screen fallback - shown before React mounts */
            #root {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: white;
            }
            .splash-fallback {
                text-align: center;
                padding: 20px;
            }
            .splash-fallback h1 {
                font-size: 2rem;
                font-weight: 700;
                color: #1e40af;
                margin: 0;
                line-height: 1.2;
            }
            @media (min-width: 640px) {
                .splash-fallback h1 {
                    font-size: 3rem;
                }
            }
        </style>
    </head>
    <body>
        <div id='root'>
            <div class="splash-fallback">
                <h1>Hospital Appointment System</h1>
            </div>
        </div>
        <script type='module' src='/src/main.tsx'></script>
    </body>
</html>
